name: Build Binaries

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: feedbrief-linux
            binary_path: target/release/feedbrief
          - os: windows-latest
            artifact_name: feedbrief-windows
            binary_path: target/release/feedbrief.exe
          - os: macos-latest
            artifact_name: feedbrief-macos
            binary_path: target/release/feedbrief

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            pkg-config

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "${{ matrix.binary_path }}" "dist/${{ matrix.artifact_name }}.exe"
          else
            cp "${{ matrix.binary_path }}" "dist/${{ matrix.artifact_name }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/
          if-no-files-found: error
